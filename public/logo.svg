<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- CMA text -->
  <text x="50%" y="130" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="100"
        font-weight="700"
        fill="#58a6ff">
    CMA
  </text>

  <!-- CONSEIL text -->
  <text x="50%" y="200" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="40"
        letter-spacing="8"
        fill="currentColor">
    CONSEIL
  </text>

  <!-- Dot pattern (scan effect) -->
  <g fill="#58a6ff">
    <circle cx="180" cy="110" r="5"/>
    <circle cx="165" cy="120" r="4"/>
    <circle cx="155" cy="135" r="3"/>
    <circle cx="150" cy="150" r="2.5"/>
    <circle cx="145" cy="165" r="2"/>
    <circle cx="140" cy="180" r="1.5"/>
  </g>
</svg>
